<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECmode Noise Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--red:#E8130A;--white:#fff;--panel:#161616;--panel2:#1a1a1a;--border:#222;--muted:#555}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
header{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px}
.header-title{font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:4px}
.wrap{width:100%;max-width:560px;display:flex;flex-direction:column;gap:16px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px}
.panel-title{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.play-btn{width:80px;height:80px;border-radius:50%;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .2s;box-shadow:0 0 32px rgba(232,19,10,.3)}
.play-btn:hover{background:#c8100a;box-shadow:0 0 48px rgba(232,19,10,.5)}
.play-btn svg{width:32px;height:32px;fill:var(--white)}
.status-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
.status-dot.playing{background:var(--red);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.status-text{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
canvas{width:100%;height:80px;border-radius:10px;background:#111;display:block}
.sel-grid{display:flex;gap:6px;flex-wrap:wrap}
.sel-btn{padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.sel-btn:hover{border-color:#444;color:var(--white)}
.sel-btn.active{border-color:var(--red);background:rgba(232,19,10,.1);color:var(--red)}
.vol-row{display:flex;align-items:center;gap:10px}
.vol-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;min-width:70px}
.vol-val{font-size:13px;font-weight:700;color:var(--white);min-width:40px;text-align:right}
input[type=range]{flex:1;accent-color:var(--red);height:4px;cursor:pointer}
.preset-grid{display:flex;gap:8px;flex-wrap:wrap}
.preset-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:var(--white);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px}
.preset-btn:hover{border-color:var(--red)}
.preset-sub{font-size:10px;color:var(--muted);font-weight:600}
.timer-display{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--white);text-align:center;margin-top:8px;min-height:32px}
footer{margin-top:32px;font-size:11px;color:#333;text-align:center;letter-spacing:.06em}
</style>
</head>
<body>
<header>
  <a href="https://recmo.de" style="text-decoration:none;display:flex;flex-direction:column;gap:3px">
    <div style="font-family:'Inter',sans-serif;line-height:1;letter-spacing:.04em"><span style="font-size:18px;font-weight:900;color:#E8130A">REC</span><span style="font-size:14px;font-weight:600;color:#fff">mode</span></div>
    <span style="font-size:9px;font-weight:600;letter-spacing:.18em;color:#fff;font-family:'Inter',sans-serif">recmo.de</span>
  </a>
  <div class="header-title">Noise Generator</div>
</header>
<div class="wrap">
  <div class="panel" style="text-align:center;padding:32px 20px">
    <button class="play-btn" id="playBtn" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    <div class="status-row"><div class="status-dot" id="statusDot"></div><span class="status-text" id="statusText">Stopped</span></div>
  </div>
  <div class="panel"><canvas id="waveCanvas"></canvas></div>
  <div class="panel">
    <div class="panel-title">Noise Type</div>
    <div class="sel-grid" id="noiseGrid"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Volume & Bass</div>
    <div class="vol-row" style="margin-bottom:10px">
      <span class="vol-label">Volume</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7" oninput="setVol(+this.value)">
      <span class="vol-val" id="volVal">70%</span>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">Binaural Beats</div>
    <div class="sel-grid" id="binauralGrid"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Sleep Timer</div>
    <div class="sel-grid" id="timerGrid"></div>
    <div class="timer-display" id="timerDisplay"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Quick Presets</div>
    <div class="preset-grid" id="presetGrid"></div>
  </div>
</div>
<footer>RECmode Noise Generator · recmo.de</footer>
<script>
const NOISE_TYPES=[{id:'white',name:'White',color:'#e0e0e0'},{id:'pink',name:'Pink',color:'#ff80ab'},{id:'brown',name:'Brown',color:'#cd8040'},{id:'blue',name:'Blue',color:'#5090ff'},{id:'green',name:'Green',color:'#40c080'}];
const BINAURAL=[{id:0,name:'Off'},{id:2,name:'Delta 2Hz'},{id:6,name:'Theta 6Hz'},{id:10,name:'Alpha 10Hz'},{id:20,name:'Beta 20Hz'},{id:40,name:'Gamma 40Hz'}];
const TIMERS=[{id:0,name:'Off'},{id:900,name:'15 min'},{id:1800,name:'30 min'},{id:3600,name:'1 hour'},{id:7200,name:'2 hours'},{id:14400,name:'4 hours'}];
const PRESETS=[{name:'Focus',sub:'Pink + Beta',noise:'pink',bin:20,timer:0},{name:'Sleep',sub:'Brown + Delta + 1h',noise:'brown',bin:2,timer:3600},{name:'Relax',sub:'Pink + Alpha',noise:'pink',bin:10,timer:0},{name:'Meditate',sub:'Brown + Theta',noise:'brown',bin:6,timer:0}];
let isPlaying=false,noiseType='white',binauralHz=0,volume=0.7,timerSecs=0,timerRemain=0,timerInterval=null;
let audioCtx=null,noiseSource=null,gainNode=null,analyser=null,binOscL=null,binOscR=null,animId=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}
function makeNoise(ctx,type){const SR=ctx.sampleRate,dur=10,N=SR*dur,buf=ctx.createBuffer(2,N,SR);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);if(type==='white'){for(let i=0;i<N;i++)d[i]=Math.random()*2-1}else if(type==='pink'){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<N;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)/5.5;b6=w*.115926}}else if(type==='brown'){let last=0;for(let i=0;i<N;i++){const w=(Math.random()*2-1)*.02;last+=w;if(last>1)last=1;if(last<-1)last=-1;d[i]=last*.3}}else if(type==='blue'){let last=0;for(let i=0;i<N;i++){const w=Math.random()*2-1;d[i]=(w-last)*.5;last=w}}else if(type==='green'){for(let i=0;i<N;i++)d[i]=Math.random()*2-1;const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=0.5}}
return buf}
function startAudio(){const ctx=getCtx();const buf=makeNoise(ctx,noiseType);noiseSource=ctx.createBufferSource();noiseSource.buffer=buf;noiseSource.loop=true;gainNode=ctx.createGain();gainNode.gain.setValueAtTime(0,ctx.currentTime);gainNode.gain.linearRampToValueAtTime(volume,ctx.currentTime+1.5);analyser=ctx.createAnalyser();analyser.fftSize=2048;noiseSource.connect(gainNode);gainNode.connect(analyser);gainNode.connect(ctx.destination);noiseSource.start();if(binauralHz>0){const baseFreq=200;const panner1=ctx.createStereoPanner();const panner2=ctx.createStereoPanner();panner1.pan.value=-1;panner2.pan.value=1;const bg1=ctx.createGain();const bg2=ctx.createGain();bg1.gain.value=.2;bg2.gain.value=.2;binOscL=ctx.createOscillator();binOscR=ctx.createOscillator();binOscL.frequency.value=baseFreq;binOscR.frequency.value=baseFreq+binauralHz;binOscL.connect(bg1);binOscR.connect(bg2);bg1.connect(panner1);bg2.connect(panner2);panner1.connect(ctx.destination);panner2.connect(ctx.destination);binOscL.start();binOscR.start()}drawWave()}
function stopAudio(){if(gainNode&&audioCtx){gainNode.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.5);setTimeout(()=>{try{noiseSource&&noiseSource.stop();binOscL&&binOscL.stop();binOscR&&binOscR.stop()}catch(e){}noiseSource=null;binOscL=null;binOscR=null;gainNode=null},1600)}cancelAnimationFrame(animId)}
function togglePlay(){isPlaying=!isPlaying;const icon=document.getElementById('playIcon');if(isPlaying){icon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';document.getElementById('statusDot').className='status-dot playing';document.getElementById('statusText').textContent='Playing';startAudio();if(timerSecs>0)startTimer()}else{icon.innerHTML='<path d="M8 5v14l11-7z"/>';document.getElementById('statusDot').className='status-dot';document.getElementById('statusText').textContent='Stopped';stopAudio();clearInterval(timerInterval);document.getElementById('timerDisplay').textContent=''}}
function setVol(v){volume=v;document.getElementById('volVal').textContent=Math.round(v*100)+'%';if(gainNode)gainNode.gain.value=v}
function drawWave(){const canvas=document.getElementById('waveCanvas');const ctx2=canvas.getContext('2d');canvas.width=canvas.offsetWidth||500;canvas.height=80;if(!analyser){ctx2.clearRect(0,0,canvas.width,canvas.height);return}const buf=new Uint8Array(analyser.frequencyBinCount);analyser.getByteTimeDomainData(buf);const color=NOISE_TYPES.find(n=>n.id===noiseType)?.color||'#fff';ctx2.fillStyle='#111';ctx2.fillRect(0,0,canvas.width,canvas.height);ctx2.strokeStyle=color;ctx2.lineWidth=2;ctx2.shadowColor=color;ctx2.shadowBlur=8;ctx2.beginPath();buf.forEach((v,i)=>{const x=i/buf.length*canvas.width,y=(v/128-1)*.4*40+40;i===0?ctx2.moveTo(x,y):ctx2.lineTo(x,y)});ctx2.stroke();animId=requestAnimationFrame(drawWave)}
function startTimer(){timerRemain=timerSecs;clearInterval(timerInterval);timerInterval=setInterval(()=>{timerRemain--;const m=Math.floor(timerRemain/60),s=timerRemain%60;document.getElementById('timerDisplay').textContent=m+':'+s.toString().padStart(2,'0');if(timerRemain<=0){clearInterval(timerInterval);if(isPlaying)togglePlay()}},1000)}
// Build UI
const ng=document.getElementById('noiseGrid');NOISE_TYPES.forEach(n=>{const b=document.createElement('button');b.className='sel-btn'+(n.id===noiseType?' active':'');b.textContent=n.name;b.addEventListener('click',()=>{noiseType=n.id;document.querySelectorAll('#noiseGrid .sel-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(isPlaying){stopAudio();setTimeout(startAudio,200)}});ng.appendChild(b)});
const bg=document.getElementById('binauralGrid');BINAURAL.forEach(n=>{const b=document.createElement('button');b.className='sel-btn'+(n.id===binauralHz?' active':'');b.textContent=n.name;b.addEventListener('click',()=>{binauralHz=n.id;document.querySelectorAll('#binauralGrid .sel-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active')});bg.appendChild(b)});
const tg=document.getElementById('timerGrid');TIMERS.forEach(n=>{const b=document.createElement('button');b.className='sel-btn'+(n.id===timerSecs?' active':'');b.textContent=n.name;b.addEventListener('click',()=>{timerSecs=n.id;document.querySelectorAll('#timerGrid .sel-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active')});tg.appendChild(b)});
const pg=document.getElementById('presetGrid');PRESETS.forEach(p=>{const b=document.createElement('button');b.className='preset-btn';b.innerHTML='<span>'+p.name+'</span><span class="preset-sub">'+p.sub+'</span>';b.addEventListener('click',()=>{noiseType=p.noise;binauralHz=p.bin;timerSecs=p.timer;document.querySelectorAll('#noiseGrid .sel-btn').forEach((x,i)=>x.classList.toggle('active',NOISE_TYPES[i].id===p.noise));document.querySelectorAll('#binauralGrid .sel-btn').forEach((x,i)=>x.classList.toggle('active',BINAURAL[i].id===p.bin));document.querySelectorAll('#timerGrid .sel-btn').forEach((x,i)=>x.classList.toggle('active',TIMERS[i].id===p.timer));if(!isPlaying)togglePlay()});pg.appendChild(b)});
</script>
</body>
</html>
