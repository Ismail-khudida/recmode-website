<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECmode QR Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d0d0d;--red:#E8130A;--white:#ffffff;--panel:#161616;--panel2:#1a1a1a;--border:#222;--muted:#555}
  body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}
  header{width:100%;max-width:580px;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
  .header-title{font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:4px}
  .wrap{width:100%;max-width:580px;display:flex;flex-direction:column;gap:16px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px}
  .panel-title{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}

  /* INPUT */
  .input-tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
  .tab-btn:hover{border-color:#444;color:var(--white)}
  .tab-btn.active{border-color:var(--red);background:rgba(232,19,10,.1);color:var(--red)}

  .input-section{display:none} .input-section.active{display:block}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .field label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .field input,.field textarea,.field select{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--white);font-family:'Inter',sans-serif;font-size:14px;width:100%;transition:border-color .15s;outline:none;resize:vertical}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--red)}
  .field textarea{min-height:80px}
  .field select option{background:#222}

  /* QR DISPLAY */
  .qr-area{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
  .qr-canvas-wrap{background:#fff;border-radius:16px;padding:20px;display:inline-block;flex-shrink:0}
  .qr-controls{flex:1;min-width:200px;display:flex;flex-direction:column;gap:12px}

  .color-row{display:flex;gap:10px;align-items:center}
  .color-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;min-width:70px}
  .color-picker-wrap{display:flex;align-items:center;gap:8px}
  input[type=color]{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;padding:2px}
  .color-hex-input{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-family:'Inter',sans-serif;font-size:13px;font-weight:700;width:100px;outline:none;transition:border-color .15s}
  .color-hex-input:focus{border-color:var(--red)}

  .size-row{display:flex;align-items:center;gap:10px}
  .size-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;min-width:70px}
  input[type=range]{flex:1;accent-color:var(--red);height:4px;cursor:pointer}
  .size-val{font-size:13px;font-weight:700;color:var(--white);min-width:40px;text-align:right}

  .ec-row{display:flex;gap:6px}
  .ec-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
  .ec-btn:hover{border-color:#444;color:var(--white)}
  .ec-btn.active{border-color:var(--red);background:rgba(232,19,10,.1);color:var(--red)}

  .section-label{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}

  .dl-btns{display:flex;gap:8px;flex-wrap:wrap}
  .dl-btn{flex:1;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:var(--white);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.06em;text-transform:uppercase;text-align:center}
  .dl-btn:hover{border-color:var(--red);color:var(--red)}
  .dl-btn.primary{background:var(--red);border-color:var(--red);color:var(--white)}
  .dl-btn.primary:hover{background:#c8100a}

  /* URL shortener label */
  .char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}

  /* Quick templates */
  .quick-grid{display:flex;gap:6px;flex-wrap:wrap}
  .quick-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
  .quick-btn:hover{border-color:#444;color:var(--white)}

  footer{margin-top:32px;font-size:11px;color:#333;text-align:center;letter-spacing:.06em}
</style>
</head>
<body>
<header>
  <a href="https://recmo.de" style="text-decoration:none;display:flex;flex-direction:column;gap:3px">
    <div style="font-family:'Inter',sans-serif;line-height:1;letter-spacing:.04em">
      <span style="font-size:18px;font-weight:900;color:#E8130A">REC</span><span style="font-size:14px;font-weight:600;color:#fff">mode</span>
    </div>
    <span style="font-size:9px;font-weight:600;letter-spacing:.18em;color:#fff;font-family:'Inter',sans-serif">recmo.de</span>
  </a>
  <div class="header-title">QR Code Generator</div>
</header>

<div class="wrap">

  <!-- INPUT -->
  <div class="panel">
    <div class="panel-title">Content</div>
    <div class="input-tabs">
      <button class="tab-btn active" onclick="setTab('url',this)">URL</button>
      <button class="tab-btn" onclick="setTab('text',this)">Text</button>
      <button class="tab-btn" onclick="setTab('email',this)">Email</button>
      <button class="tab-btn" onclick="setTab('wifi',this)">WiFi</button>
      <button class="tab-btn" onclick="setTab('vcard',this)">vCard</button>
    </div>

    <div class="input-section active" id="sec-url">
      <div class="field">
        <label>URL</label>
        <input type="url" id="url-input" placeholder="https://recmo.de" value="https://recmo.de" oninput="generate()">
      </div>
      <div class="quick-grid">
        <button class="quick-btn" onclick="setUrl('https://recmo.de')">recmo.de</button>
        <button class="quick-btn" onclick="setUrl('https://instagram.com/')">Instagram</button>
        <button class="quick-btn" onclick="setUrl('https://tiktok.com/')">TikTok</button>
        <button class="quick-btn" onclick="setUrl('https://youtube.com/')">YouTube</button>
      </div>
    </div>

    <div class="input-section" id="sec-text">
      <div class="field">
        <label>Text</label>
        <textarea id="text-input" placeholder="Enter any text…" oninput="generate()"></textarea>
        <div class="char-count" id="charCount">0 chars</div>
      </div>
    </div>

    <div class="input-section" id="sec-email">
      <div class="field"><label>To</label><input id="email-to" placeholder="info@recmo.de" oninput="generate()"></div>
      <div class="field"><label>Subject</label><input id="email-sub" placeholder="Subject…" oninput="generate()"></div>
      <div class="field"><label>Body</label><textarea id="email-body" placeholder="Message…" oninput="generate()"></textarea></div>
    </div>

    <div class="input-section" id="sec-wifi">
      <div class="field"><label>Network Name (SSID)</label><input id="wifi-ssid" placeholder="MyWiFi" oninput="generate()"></div>
      <div class="field"><label>Password</label><input id="wifi-pass" type="password" placeholder="••••••••" oninput="generate()"></div>
      <div class="field"><label>Security</label>
        <select id="wifi-sec" onchange="generate()">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="">None</option>
        </select>
      </div>
    </div>

    <div class="input-section" id="sec-vcard">
      <div class="field"><label>Name</label><input id="vc-name" placeholder="Max Mustermann" oninput="generate()"></div>
      <div class="field"><label>Phone</label><input id="vc-phone" placeholder="+49 123 456789" oninput="generate()"></div>
      <div class="field"><label>Email</label><input id="vc-email" placeholder="max@recmo.de" oninput="generate()"></div>
      <div class="field"><label>Website</label><input id="vc-url" placeholder="https://recmo.de" oninput="generate()"></div>
      <div class="field"><label>Company</label><input id="vc-org" placeholder="RECmode" oninput="generate()"></div>
    </div>
  </div>

  <!-- QR OUTPUT -->
  <div class="panel">
    <div class="panel-title">QR Code</div>
    <div class="qr-area">
      <div class="qr-canvas-wrap" id="qrWrap">
        <canvas id="qrCanvas" width="256" height="256"></canvas>
      </div>
      <div class="qr-controls">

        <div>
          <div class="section-label" style="margin-bottom:10px">Colors</div>
          <div class="color-row" style="margin-bottom:8px">
            <span class="color-label">QR Color</span>
            <div class="color-picker-wrap">
              <input type="color" id="fgColor" value="#000000" oninput="syncColor('fg')">
              <input class="color-hex-input" id="fgHex" value="#000000" oninput="syncHex('fg')">
            </div>
          </div>
          <div class="color-row">
            <span class="color-label">Background</span>
            <div class="color-picker-wrap">
              <input type="color" id="bgColor" value="#ffffff" oninput="syncColor('bg')">
              <input class="color-hex-input" id="bgHex" value="#ffffff" oninput="syncHex('bg')">
            </div>
          </div>
          <div class="quick-grid" style="margin-top:10px">
            <button class="quick-btn" onclick="setColors('#000000','#ffffff')">Classic</button>
            <button class="quick-btn" onclick="setColors('#E8130A','#0d0d0d')">RECmode</button>
            <button class="quick-btn" onclick="setColors('#ffffff','#0d0d0d')">Dark</button>
            <button class="quick-btn" onclick="setColors('#1a1a2e','#e8e8ff')">Night</button>
          </div>
        </div>

        <div>
          <div class="section-label" style="margin-bottom:8px">Size</div>
          <div class="size-row">
            <span class="size-label">px</span>
            <input type="range" id="sizeSlider" min="128" max="1024" step="64" value="256" oninput="onSize()">
            <span class="size-val" id="sizeVal">256</span>
          </div>
        </div>

        <div>
          <div class="section-label" style="margin-bottom:8px">Error Correction</div>
          <div class="ec-row">
            <button class="ec-btn active" onclick="setEC('L',this)">L (7%)</button>
            <button class="ec-btn" onclick="setEC('M',this)">M (15%)</button>
            <button class="ec-btn" onclick="setEC('Q',this)">Q (25%)</button>
            <button class="ec-btn" onclick="setEC('H',this)">H (30%)</button>
          </div>
        </div>

      </div>
    </div>

    <div class="dl-btns" style="margin-top:16px">
      <button class="dl-btn primary" onclick="downloadPNG()">↓ Download PNG</button>
      <button class="dl-btn" onclick="downloadSVG()">↓ Download SVG</button>
      <button class="dl-btn" onclick="copyDataUrl()">Copy Image</button>
    </div>
  </div>

</div>
<footer>RECmode QR Code Generator · recmo.de</footer>

<script>
// ─── EMBEDDED QR LIBRARY (Reed-Solomon + Matrix) ──────────────────────────────
// Minimal QR code generator — pure JS, no dependencies
// Based on the QR code spec ISO/IEC 18004

const QRCode = (() => {
  // Galois field arithmetic for GF(256)
  const EXP = new Uint8Array(512);
  const LOG = new Uint8Array(256);
  (() => {
    let x = 1;
    for (let i = 0; i < 255; i++) {
      EXP[i] = x;
      LOG[x] = i;
      x <<= 1;
      if (x & 0x100) x ^= 0x11d;
    }
    for (let i = 255; i < 512; i++) EXP[i] = EXP[i - 255];
  })();

  const gfMul = (a, b) => a && b ? EXP[LOG[a] + LOG[b]] : 0;
  const gfPow = (x, p) => EXP[(LOG[x] * p) % 255];
  const gfInv = (x) => EXP[255 - LOG[x]];

  function gfPolyMul(p, q) {
    const r = new Uint8Array(p.length + q.length - 1);
    for (let i = 0; i < p.length; i++)
      for (let j = 0; j < q.length; j++)
        r[i + j] ^= gfMul(p[i], q[j]);
    return r;
  }

  function gfPolyDiv(msg, gen) {
    let r = new Uint8Array(msg);
    for (let i = 0; i < msg.length - (gen.length - 1); i++) {
      const c = r[i];
      if (c !== 0) for (let j = 1; j < gen.length; j++) r[i + j] ^= gfMul(gen[j], c);
    }
    return r.slice(msg.length - (gen.length - 1));
  }

  function rsGenPoly(n) {
    let g = new Uint8Array([1]);
    for (let i = 0; i < n; i++) g = gfPolyMul(g, new Uint8Array([1, gfPow(2, i)]));
    return g;
  }

  // Character count + encoding
  const EC_CODEWORDS = {
    L: [[7,10,13,17],[19,16,13,9],[1,1,1,1],[0,0,0,0]],
    M: [[10,16,22,28],[16,28,22,16],[1,1,1,1],[0,0,0,0]],
    Q: [[13,22,32,40],[13,22,16,12],[1,1,2,2],[0,0,0,0]],
    H: [[17,28,40,50],[9,16,10,8],[1,1,2,4],[0,0,0,0]],
  };

  // QR version/capacity tables (simplified — versions 1-10 byte mode)
  const CAPACITY = {
    L: [17,32,53,78,106,134,154,192,230,271],
    M: [14,26,42,62,84,106,122,154,178,221],
    Q: [11,20,32,46,60,74,86,108,130,151],
    H: [7,14,24,34,44,58,63,84,98,119],
  };

  function getVersion(len, ec) {
    const caps = CAPACITY[ec];
    for (let v = 0; v < caps.length; v++) if (len <= caps[v]) return v + 1;
    return -1; // too long
  }

  // Format info strings (pre-computed)
  const FORMAT_INFO = {
    L: [0x77c4,0x72f3,0x7daa,0x789d,0x662f,0x6318,0x6c41,0x6976],
    M: [0x5412,0x5125,0x5e7c,0x5b4b,0x45f9,0x40ce,0x4f97,0x4aa0],
    Q: [0x355f,0x3068,0x3f31,0x3a06,0x24b4,0x2183,0x2eda,0x2bed],
    H: [0x1689,0x13be,0x1ce7,0x19d0,0x0762,0x0255,0x0d0c,0x083b],
  };

  const EC_MAP = {L:1,M:0,Q:3,H:2};

  function encode(text, ecLevel) {
    ecLevel = ecLevel || 'M';
    const data = new TextEncoder().encode(text);
    const version = getVersion(data.length, ecLevel);
    if (version < 1) return null;

    const size = version * 4 + 17;
    const matrix = Array.from({length:size}, () => new Int8Array(size).fill(-1));
    const reserved = Array.from({length:size}, () => new Uint8Array(size));

    // ── Finder patterns ──
    function placeFinderPattern(r, c) {
      for (let dr = -1; dr <= 7; dr++) for (let dc = -1; dc <= 7; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= size || nc < 0 || nc >= size) continue;
        const inFinder = dr >= 0 && dr <= 6 && dc >= 0 && dc <= 6;
        const onBorder = dr === 0 || dr === 6 || dc === 0 || dc === 6;
        const inCenter = dr >= 2 && dr <= 4 && dc >= 2 && dc <= 4;
        matrix[nr][nc] = (inFinder && (onBorder || inCenter)) ? 1 : 0;
        reserved[nr][nc] = 1;
      }
    }
    placeFinderPattern(0, 0);
    placeFinderPattern(0, size - 7);
    placeFinderPattern(size - 7, 0);

    // ── Timing patterns ──
    for (let i = 8; i < size - 8; i++) {
      if (reserved[6][i]) continue;
      matrix[6][i] = matrix[i][6] = i % 2 === 0 ? 1 : 0;
      reserved[6][i] = reserved[i][6] = 1;
    }

    // ── Dark module ──
    matrix[size - 8][8] = 1; reserved[size - 8][8] = 1;

    // ── Alignment patterns (version >= 2) ──
    const ALIGN_TABLE = [[],[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46]];
    if (version >= 2) {
      const coords = ALIGN_TABLE[version - 1] || [];
      for (const r of coords) for (const c of coords) {
        if (reserved[r][c]) continue;
        for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
          const onBorder = Math.abs(dr) === 2 || Math.abs(dc) === 2;
          const isCenter = dr === 0 && dc === 0;
          matrix[r+dr][c+dc] = (onBorder || isCenter) ? 1 : 0;
          reserved[r+dr][c+dc] = 1;
        }
      }
    }

    // ── Format info (placeholder) ──
    function placeFormat(fi) {
      const fmtBits = [];
      for (let i = 14; i >= 0; i--) fmtBits.push((fi >> i) & 1);
      // horizontal
      let bit = 0;
      for (let c = 0; c <= 8; c++) {
        if (c === 6) continue;
        matrix[8][c] = fmtBits[bit++];
        reserved[8][c] = 1;
      }
      for (let c = size - 8; c < size; c++) { matrix[8][c] = fmtBits[bit++]; reserved[8][c] = 1; }
      // vertical
      bit = 0;
      for (let r = size - 1; r >= size - 8; r--) { matrix[r][8] = fmtBits[bit++]; reserved[r][8] = 1; }
      for (let r = 8; r >= 0; r--) {
        if (r === 6) continue;
        matrix[r][8] = fmtBits[bit++]; reserved[r][8] = 1;
      }
    }

    // ── Data encoding ──
    const bits = [];
    // Mode indicator (byte = 0100)
    bits.push(0,1,0,0);
    // Character count
    const ccLen = version < 10 ? 8 : 16;
    for (let i = ccLen - 1; i >= 0; i--) bits.push((data.length >> i) & 1);
    // Data
    for (const byte of data) for (let i = 7; i >= 0; i--) bits.push((byte >> i) & 1);
    // Terminator
    for (let i = 0; i < 4 && bits.length % 8 !== 0; i++) bits.push(0);
    while (bits.length % 8 !== 0) bits.push(0);
    // Padding bytes
    const PAD = [0xec, 0x11];
    const totalDataBytes = CAPACITY[ecLevel][version - 1];
    let padIdx = 0;
    while (bits.length < totalDataBytes * 8) {
      const p = PAD[padIdx++ % 2];
      for (let i = 7; i >= 0; i--) bits.push((p >> i) & 1);
    }

    // ── RS error correction ──
    const dataBytes = new Uint8Array(totalDataBytes);
    for (let i = 0; i < totalDataBytes; i++) {
      let v = 0;
      for (let b = 0; b < 8; b++) v = (v << 1) | bits[i * 8 + b];
      dataBytes[i] = v;
    }
    const ecCount = [0, 10, 16, 26, 18, 24, 16, 18, 22, 22, 26][version];
    const gen = rsGenPoly(ecCount);
    const msgPoly = new Uint8Array(totalDataBytes + ecCount);
    msgPoly.set(dataBytes);
    const ecBytes = gfPolyDiv(msgPoly, gen);

    // Combine
    const allBytes = new Uint8Array(totalDataBytes + ecCount);
    allBytes.set(dataBytes);
    allBytes.set(ecBytes, totalDataBytes);

    // To bits
    const allBits = [];
    for (const b of allBytes) for (let i = 7; i >= 0; i--) allBits.push((b >> i) & 1);

    // ── Place data bits ──
    let bitIdx = 0;
    let up = true;
    for (let col = size - 1; col >= 1; col -= 2) {
      if (col === 6) col = 5;
      for (let i = 0; i < size; i++) {
        const row = up ? size - 1 - i : i;
        for (let dx = 0; dx < 2; dx++) {
          const c = col - dx;
          if (!reserved[row][c] && bitIdx < allBits.length) {
            matrix[row][c] = allBits[bitIdx++];
          }
        }
      }
      up = !up;
    }

    // ── Masking (pattern 0: (row+col) % 2 == 0) ──
    const bestMask = 0;
    const maskFn = (r, c) => (r + c) % 2 === 0;
    for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
      if (!reserved[r][c] && maskFn(r, c)) matrix[r][c] ^= 1;
    }

    // Place final format info
    const fi = FORMAT_INFO[ecLevel][bestMask];
    placeFormat(fi);

    return { matrix, size };
  }

  return { encode };
})();

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentTab = 'url';
let fgColor = '#000000';
let bgColor = '#ffffff';
let qrSize = 256;
let ecLevel = 'L';

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.input-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  btn.classList.add('active');
  generate();
}

function setUrl(url) {
  document.getElementById('url-input').value = url;
  generate();
}

function getContent() {
  switch(currentTab) {
    case 'url': return document.getElementById('url-input').value || 'https://recmo.de';
    case 'text': {
      const t = document.getElementById('text-input').value;
      document.getElementById('charCount').textContent = t.length + ' chars';
      return t || 'RECmode';
    }
    case 'email': {
      const to = document.getElementById('email-to').value;
      const sub = document.getElementById('email-sub').value;
      const body = document.getElementById('email-body').value;
      return `mailto:${to}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
    }
    case 'wifi': {
      const ssid = document.getElementById('wifi-ssid').value;
      const pass = document.getElementById('wifi-pass').value;
      const sec = document.getElementById('wifi-sec').value;
      return `WIFI:T:${sec};S:${ssid};P:${pass};;`;
    }
    case 'vcard': {
      const n = document.getElementById('vc-name').value;
      const ph = document.getElementById('vc-phone').value;
      const em = document.getElementById('vc-email').value;
      const url = document.getElementById('vc-url').value;
      const org = document.getElementById('vc-org').value;
      return `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${ph}\nEMAIL:${em}\nURL:${url}\nORG:${org}\nEND:VCARD`;
    }
  }
  return '';
}

function drawQR(qr) {
  const canvas = document.getElementById('qrCanvas');
  const wrap = document.getElementById('qrWrap');
  wrap.style.background = bgColor;
  canvas.width = qrSize;
  canvas.height = qrSize;
  canvas.style.width = Math.min(qrSize, 300) + 'px';
  canvas.style.height = Math.min(qrSize, 300) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, qrSize, qrSize);

  if (!qr) {
    ctx.fillStyle = fgColor;
    ctx.font = 'bold 14px Inter, Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Content too long', qrSize/2, qrSize/2);
    return;
  }

  const cellSize = qrSize / qr.size;
  ctx.fillStyle = fgColor;
  for (let r = 0; r < qr.size; r++) {
    for (let c = 0; c < qr.size; c++) {
      if (qr.matrix[r][c] === 1) {
        ctx.fillRect(Math.floor(c * cellSize), Math.floor(r * cellSize),
                     Math.ceil(cellSize), Math.ceil(cellSize));
      }
    }
  }
}

function generate() {
  const content = getContent();
  try {
    const qr = QRCode.encode(content, ecLevel);
    drawQR(qr);
  } catch(e) {
    drawQR(null);
  }
}

function syncColor(which) {
  const val = document.getElementById(which+'Color').value;
  if (which === 'fg') { fgColor = val; document.getElementById('fgHex').value = val; }
  else { bgColor = val; document.getElementById('bgHex').value = val; document.getElementById('qrWrap').style.background = val; }
  generate();
}

function syncHex(which) {
  const val = document.getElementById(which+'Hex').value;
  if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
    if (which === 'fg') { fgColor = val; document.getElementById('fgColor').value = val; }
    else { bgColor = val; document.getElementById('bgColor').value = val; document.getElementById('qrWrap').style.background = val; }
    generate();
  }
}

function setColors(fg, bg) {
  fgColor = fg; bgColor = bg;
  document.getElementById('fgColor').value = fg;
  document.getElementById('bgColor').value = bg;
  document.getElementById('fgHex').value = fg;
  document.getElementById('bgHex').value = bg;
  generate();
}

function onSize() {
  qrSize = parseInt(document.getElementById('sizeSlider').value);
  document.getElementById('sizeVal').textContent = qrSize;
  generate();
}

function setEC(ec, btn) {
  ecLevel = ec;
  document.querySelectorAll('.ec-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  generate();
}

function downloadPNG() {
  const canvas = document.getElementById('qrCanvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'recmode-qr.png';
  a.click();
}

function downloadSVG() {
  const content = getContent();
  const qr = QRCode.encode(content, ecLevel);
  if (!qr) return;
  const cell = 10;
  const sz = qr.size * cell;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">`;
  svg += `<rect width="${sz}" height="${sz}" fill="${bgColor}"/>`;
  for (let r = 0; r < qr.size; r++) for (let c = 0; c < qr.size; c++) {
    if (qr.matrix[r][c] === 1) svg += `<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="${fgColor}"/>`;
  }
  svg += '</svg>';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([svg], {type:'image/svg+xml'}));
  a.download = 'recmode-qr.svg';
  a.click();
}

function copyDataUrl() {
  const canvas = document.getElementById('qrCanvas');
  canvas.toBlob(blob => {
    const item = new ClipboardItem({'image/png': blob});
    navigator.clipboard.write([item]).catch(() => {});
  });
}

generate();
</script>
